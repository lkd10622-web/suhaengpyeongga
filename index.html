<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini AI 스마트 학업 플래너</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #e3f2fd, #fce4ec); font-family: Arial, sans-serif; color: #333; }
    .container { width: min(900px, 92%); margin: 40px auto; background: #ffffff; border-radius: 24px; padding: 28px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16); }
    h1 { margin: 0 0 8px; text-align: center; font-size: 28px; color: #1e88e5; }
    .subtitle { text-align: center; color: #777; margin-bottom: 24px; font-size: 14px; }
    .info { padding: 14px; margin-bottom: 20px; border-radius: 14px; background: #e8f5e9; color: #2e7d32; font-size: 14px; line-height: 1.6; }
    .user-info { display: flex; justify-content: space-between; align-items: center; background: #f1f8ff; padding: 12px 20px; border-radius: 14px; margin-bottom: 20px; font-weight: bold; border: 1px solid #d0e8ff; }
    
    input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; outline: none; }
    input { height: 44px; }
    textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
    .form-group { margin-bottom: 15px; }
    .label { font-weight: bold; margin-bottom: 6px; }
    .button-row { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-top: 14px; }
    
    button { border: none; border-radius: 12px; padding: 0 18px; height: 46px; font-size: 15px; cursor: pointer; transition: 0.15s; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { cursor: not-allowed; opacity: 0.6; transform: none; }
    
    .make-btn { background: #42a5f5; color: white; width: 100%; }
    .clear-btn { background: #b0bec5; color: white; }
    .logout-btn { background: #e57373; color: white; height: 36px; padding: 0 12px; font-size: 13px; }
    .ai-btn { background: #9b59b6; color: white; width: auto; height: 40px; font-size: 13px; margin-top: 8px;}
    .tts-btn { background: #2ecc71; color: white; width: auto; height: 40px; font-size: 13px; margin-top: 12px; }
    .stop-btn { background: #ef5350; color: white; width: auto; height: 40px; font-size: 13px; margin-top: 12px; margin-left: 6px; }
    
    .hidden { display: none; }
    .schedule-list-title { margin-top: 30px; border-bottom: 2px solid #42a5f5; padding-bottom: 8px; color: #1e88e5; }
    .schedule-item { background: #f7f9fb; padding: 20px; border-left: 6px solid #42a5f5; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .ai-box { background: #f5efff; border: 1px solid #d6c2f0; padding: 16px; margin-top: 12px; border-radius: 8px; font-size: 14px; white-space: pre-wrap; line-height: 1.6; color: #4a148c; }
    .help { margin-top: 20px; font-size: 13px; color: #777; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 Gemini 스마트 학업 플래너</h1>
    <div class="subtitle">노트북 환경 최적화 제미나이 족보 생성 플래너</div>

    <div class="info">
      안내: 지정해주신 구글 앱스크립트 웹앱 주소가 성공적으로 동기화되었습니다. 일정을 등록하고 요약 노트를 마음껏 생성해 보세요.
    </div>

    <div id="loginSection" style="text-align: center; padding: 40px 0;">
      <h2 style="margin-bottom: 20px;">서비스를 이용하려면 로그인이 필요합니다</h2>
      <button class="make-btn" id="loginBtn" style="max-width: 300px;">🌐 Google 계정으로 로그인</button>
    </div>

    <div id="appSection" class="hidden">
      <div class="user-info">
        <div>👋 <span id="userName">사용자</span>님 반갑습니다!</div>
        <button class="logout-btn" id="logoutBtn">로그아웃</button>
      </div>

      <div class="form-group">
        <div class="label">과목명</div>
        <input type="text" id="subjectInput" placeholder="예: 정보, 수학, 세계사" />
      </div>

      <div class="form-group">
        <div class="label">시험 범위 / 수행평가 내용 (AI 요약 대상)</div>
        <textarea id="textInput" placeholder="인공지능이 분석하여 상세 족보를 만들어줄 내용을 적어주세요."></textarea>
      </div>

      <div class="form-group">
        <div class="label">마감 / 시험 날짜</div>
        <input type="date" id="examDate" />
      </div>

      <div class="button-row">
        <button class="clear-btn" id="clearBtn">초기화</button>
        <button class="make-btn" id="submitBtn" style="width: auto;">📅 플래너에 일정 등록</button>
      </div>

      <h2 class="schedule-list-title">📋 나의 수행평가 & AI 학습 지원 목록</h2>
      <div id="scheduleList"></div>
    </div>
    <div class="help">본 플래너는 개인 맞춤형 데이터베이스 연동형 웹서비스입니다.</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAbZphaQMs38wC0zRDBXOT7oiRe2p8ABQs",
      authDomain: "yaho-9c14e.firebaseapp.com",
      databaseURL: "https://yaho-9c14e-default-rtdb.firebaseio.com",
      projectId: "yaho-9c14e",
      storageBucket: "yaho-9c14e.firebasestorage.app",
      messagingSenderId: "63667122547",
      appId: "1:63667122547:web:1fb4d268d3e96b25d79506"
    };

    // 🔗 보내주신 앱스크립트 주소를 다이렉트로 반영해 두었습니다!
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9Hj1h5PqKNFuxluLMGcPkw6YIISyN5POtIlZSESTbGAF2G9SPc3nTlg79fFFW6Mzg-Q/exec';

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    let currentUser = null;

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUser = user;
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('userName').innerText = user.displayName;
        loadSchedules(user.uid); 
      } else {
        currentUser = null;
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('appSection').classList.add('hidden');
      }
    });

    document.getElementById('loginBtn').addEventListener('click', () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()));
    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('subjectInput').value = ''; document.getElementById('textInput').value = ''; document.getElementById('examDate').value = '';
    });

    document.getElementById('submitBtn').addEventListener('click', () => {
      const subject = document.getElementById('subjectInput').value.trim();
      const range = document.getElementById('textInput').value.trim();
      const date = document.getElementById('examDate').value;
      if (!subject || !range || !date) { alert("모든 칸을 입력해 주세요!"); return; }

      database.ref('user_schedules/' + currentUser.uid).push({ subject: subject, range: range, date: date }).then(() => {
        document.getElementById('subjectInput').value = ""; document.getElementById('textInput').value = ""; document.getElementById('examDate').value = "";
      });
    });

    function loadSchedules(uid) {
      database.ref('user_schedules/' + uid).on('value', (snapshot) => {
        const listDiv = document.getElementById('scheduleList');
        listDiv.innerHTML = ""; 
        if(!snapshot.exists()) return;

        snapshot.forEach((childSnapshot) => {
          const key = childSnapshot.key;
          const item = childSnapshot.val();
          const cleanRange = item.range.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '\\r');

          listDiv.innerHTML += `
            <div class="schedule-item">
              <h3>📘 [${item.subject}] 수행평가 및 시험</h3>
              <p><strong>📅 날짜:</strong> ${item.date}</p>
              <p><strong>📖 원본 범위:</strong> ${item.range}</p>
              <div style="margin-top:12px;">
                <button class="ai-btn" id="summary-btn-${key}" onclick="generateGeminiNote('${key}', '${item.subject}', '${cleanRange}')">📋 Gemini 실전 족보 요약 생성</button>
              </div>
              <div id="ai-box-${key}" class="ai-box hidden"></div>
              <div id="audio-ui-${key}" class="hidden">
                 <button class="tts-btn" id="tts-btn-${key}" onclick="speakText('${key}')">🔊 이 요약 내용 음성으로 듣기</button>
                 <button class="stop-btn" onclick="stopSpeech()">⏹️ 정지</button>
              </div>
            </div>
          `;
        });
      });
    }

    async function generateGeminiNote(key, subject, range) {
      const btn = document.getElementById(`summary-btn-${key}`);
      const aiBox = document.getElementById(`ai-box-${key}`);
      const audioUI = document.getElementById(`audio-ui-${key}`);

      btn.disabled = true; btn.textContent = "⏳ Gemini가 요약 노트를 굽는 중...";
      aiBox.classList.remove('hidden'); aiBox.innerText = "🤖 구글 제미나이 엔진이 지식을 컴파일 중입니다...";

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'cors', // 노트북 및 웹 표준 CORS 허용 매칭
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            question: `과목명: [${subject}]\n공부 범위: [${range}]\n\n위 내용에 관해 실전 핵심 요약 노트를 작성해줘.\n1. [핵심 개념 마스터]: 시험에 무조건 출제되는 핵심 원리 3가지를 정리해줘.\n2. [필수 암기 키워드]: 주요 핵심 단어 뜻풀이를 정리해줘.\n3. [적중 예상문제]: 문제 2개를 뽑고 정답과 해설을 적어줘.\n깔끔하게 한국어로 요약해줘.`
          })
        });

        const data = await response.json();
        if (data.answer) {
          aiBox.innerText = data.answer;
          audioUI.classList.remove('hidden');
          btn.textContent = "✅ 요약 노트 생성 완료";
        } else if (data.error) {
          throw new Error(data.error);
        }
      } catch (error) {
        aiBox.innerText = `❌ 오류 발생: ${error.message}\n(구글 앱스크립트에 최신 제미나이 키가 저장되어 있고 [새 배포]가 정상적으로 끝났는지 꼭 확인해 보세요.)`;
        btn.disabled = false; btn.textContent = "📋 Gemini 실전 족보 요약 생성";
      }
    }

    function speakText(key) {
      window.speechSynthesis.cancel(); 
      const text = document.getElementById(`ai-box-${key}`).innerText;
      const cleanText = text.replace(/[*#`\-]/g, ' ').trim();
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.1; // 집 노트북 환경에서 가장 듣기 좋은 배속
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeech() {
      window.speechSynthesis.cancel();
    }
  </script>
</body>
</html>
