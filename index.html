<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 학업 지원 플래너 & 족보 요약기</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1, h2 { text-align: center; color: #1a73e8; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
    }
    .btn:hover { background-color: #1557b0; }
    .btn-summary { background-color: #34a853; }
    .btn-summary:hover { background-color: #2b8c44; }
    .btn-audio { background-color: #fbbc05; color: #333; }
    .btn-audio:hover { background-color: #e6a800; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .input-group input, .input-group textarea {
      width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
    }
    .list-container { margin-top: 25px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
    .summary-box {
      margin-top: 25px; padding: 20px; background: #e8f0fe; border-left: 5px solid #1a73e8; border-radius: 6px;
      white-space: pre-wrap; line-height: 1.6; display: none;
    }
    .audio-controls { display: none; margin-top: 15px; text-align: center; }
    .status { color: #666; font-style: italic; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎓 AI 학업 지원 플래너</h1>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAbZphaQMs38wC0zRDBXOT7oiRe2p8ABQs",
      authDomain: "yaho-9c14e.firebaseapp.com",
      databaseURL: "https://yaho-9c14e-default-rtdb.firebaseio.com",
      projectId: "yaho-9c14e",
      storageBucket: "yaho-9c14e.firebasestorage.app",
      messagingSenderId: "63667122547",
      appId: "1:63667122547:web:1fb4d268d3e96b25d79506"
    };
    firebase.initializeApp(firebaseConfig);
    // (여기에 필요한 로그인 및 DB 로직이 기존에 구현되어 있다면 그대로 작동합니다)
  </script>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdrA0blPy-eEDSEPG7FtMPz7EaehGUXpIzeTaFz3MOrg0DhuJdh5Of0i2Z-8SM5Lnfyg/exec';
    let currentTtsText = ""; // TTS용 전역 변수
  </script>

  <div class="input-group">
    <label>과목명</label>
    <input type="text" id="subject" placeholder="예: 통합과학, 수학I">
  </div>
  <div class="input-group">
    <label>시험 범위 및 학습 내용</label>
    <textarea id="range" rows="3" placeholder="예: 교과서 45p~80p, 세포 분열과 유전 법칙 단원"></textarea>
  </div>
  <button class="btn" onclick="addSchedule()">📅 플래너에 일정 등록</button>

  <div class="list-container">
    <h3>📋 나의 수행평가 & AI 학습 지원 목록</h3>
    <div id="scheduleList">등록된 일정이 없습니다. 테스트용 내용을 입력 후 등록해 주세요.</div>
  </div>

  <button class="btn btn-summary" onclick="generateAiSummary()">📋 공부할 내용 요약 생성 (Gemini)</button>
  
  <div class="audio-controls" id="audioSection">
    <button class="btn btn-audio" onclick="playTtsAudio()">🔊 요약 내용 오디오로 듣기 (TTS)</button>
    <button class="btn" style="background-color:#ea4335;" onclick="stopTtsAudio()">⏹️ 음성 중지</button>
  </div>

  <div class="status" id="statusMessage"></div>

  <div class="summary-box" id="summaryBox"></div>
</div>

<script>
  // 간단한 화면 UI용 임시 일정 저장 배열
  let schedules = [];

  function addSchedule() {
    const subject = document.getElementById('subject').value;
    const range = document.getElementById('range').value;
    
    if(!subject || !range) {
      alert("과목과 범위를 입력해 주세요!");
      return;
    }
    
    schedules.push({ subject, range });
    document.getElementById('subject').value = '';
    document.getElementById('range').value = '';
    
    updateList();
  }

  function updateList() {
    const listDiv = document.getElementById('scheduleList');
    if(schedules.length === 0) {
      listDiv.innerHTML = "등록된 일정이 없습니다.";
      return;
    }
    
    let html = "<ul>";
    schedules.forEach((item, index) => {
      html += `<li><strong>[${item.subject}]</strong> ${item.range}</li>`;
    });
    html += "</ul>";
    listDiv.innerHTML = html;
  }

  // 🧠 1. 제미나이 AI 요약 생성 함수
  async function generateAiSummary() {
    if (schedules.length === 0) {
      alert("플래너에 등록된 일정이 없습니다. 최소 1개 이상의 일정을 추가한 뒤 요약해 주세요!");
      return;
    }

    const statusMsg = document.getElementById('statusMessage');
    const summaryBox = document.getElementById('summaryBox');
    const audioSection = document.getElementById('audioSection');
    
    statusMsg.innerText = "⚡ 제미나이가 실전 족보 요약을 생성하는 중입니다. 잠시만 기다려주세요...";
    summaryBox.style.display = 'none';
    audioSection.style.display = 'none';
    stopTtsAudio(); // 기존 재생 중인 오디오가 있다면 중지

    // 등록된 모든 일정을 텍스트로 합성
    let scheduleText = schedules.map(s => `과목: ${s.subject}\n범위: ${s.range}`).join('\n\n');
    let promptQuestion = `아래 시험 범위들을 분석해서 고등학교 시험에 무조건 나오는 핵심 요점정리 족보를 만들어줘. 암기 팁도 포함해줘:\n\n${scheduleText}`;

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // 구글 웹앱 통신용 표준 세팅
        body: JSON.stringify({ question: promptQuestion })
      });

      if (!response.ok) throw new Error("네트워크 응답 실패");

      const data = await response.json();

      if (data.error) {
        statusMsg.innerText = "❌ 오류 발생: " + data.error;
      } else {
        statusMsg.innerText = "✅ 요약본 생성 완료!";
        summaryBox.innerText = data.answer;
        summaryBox.style.display = 'block';
        
        // 백엔드(앱스크립트)에서 가공해 준 깔끔한 TTS용 텍스트 저장
        currentTtsText = data.ttsText || data.answer.replace(/[*#`_\-]/g, ' ');
        
        // 요약이 성공하면 오디오 듣기 버튼 영역을 스르륵 노출
        audioSection.style.display = 'block';
      }
    } catch (error) {
      statusMsg.innerText = "❌ 오류 발생: Failed to fetch\n(구글 앱스크립트 주소 매칭 또는 코드 배포 상태를 다시 확인해 보세요.)";
      console.error(error);
    }
  }

  // 🔊 2. 브라우저 내장엔진 기반 한국어 오디오 재생 함수 (TTS)
  function playTtsAudio() {
    if (!currentTtsText) {
      alert("읽어줄 요약 내용이 없습니다.");
      return;
    }

    // 현재 읽고 있는 음성이 있다면 즉시 취소하여 겹침 방지
    window.speechSynthesis.cancel();

    // 브라우저 내장 SpeechSynthesisUtterance 객체 생성
    const speech = new SpeechSynthesisUtterance(currentTtsText);
    
    // 한국어(ko-KR) 전용 설정
    speech.lang = 'ko-KR';
    speech.rate = 1.0;  // 읽기 속도 (0.5 ~ 2.0)
    speech.pitch = 1.0; // 목소리 톤 (0.0 ~ 2.0)

    // 스마트폰 및 브라우저별 한국어 최적 구글 목소리 매칭 (선택사항)
    const voices = window.speechSynthesis.getVoices();
    const koreanVoice = voices.find(voice => voice.lang === 'ko-KR' || voice.lang.startsWith('ko'));
    if (koreanVoice) {
      speech.voice = koreanVoice;
    }

    // 재생 상태 표시
    document.getElementById('statusMessage').innerText = "📢 AI 요약본을 음성으로 낭독하고 있습니다...";
    
    // 오디오 시동!
    window.speechSynthesis.speak(speech);

    // 재생이 정상 종료되었을 때 이벤트
    speech.onend = function() {
      document.getElementById('statusMessage').innerText = "✅ 음성 낭독이 완료되었습니다.";
    };
  }

  // ⏹️ 3. 오디오 재생 강제 중지 함수
  function stopTtsAudio() {
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      document.getElementById('statusMessage').innerText = "⏹️ 음성 재생이 중지되었습니다.";
    }
  }

  // 브라우저 음성 목록 로딩 처리 (일부 브라우저 비동기 버그 방지용)
  if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => {};
  }
</script>

</body>
</html>
