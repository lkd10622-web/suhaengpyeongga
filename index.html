<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 스마트 학업 플래너 & TTS</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
      color: #1e88e5;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .info {
      padding: 14px;
      margin-bottom: 20px;
      border-radius: 14px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 14px;
      line-height: 1.6;
    }

    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f1f8ff;
      padding: 12px 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      font-weight: bold;
      border: 1px solid #d0e8ff;
    }

    .option-box {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    select, input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      font-family: Arial, sans-serif;
    }

    select, input {
      height: 44px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus, select:focus, input:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, .download-link {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover, .download-link:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .make-btn { background: #42a5f5; color: white; width: 100%; }
    .clear-btn { background: #b0bec5; color: white; }
    .logout-btn { background: #e57373; color: white; height: 36px; padding: 0 12px; font-size: 13px; }
    .ai-btn { background: #9b59b6; color: white; width: auto; height: 38px; font-size: 13px; margin-top: 8px;}
    .download-link { background: #7e57c2; color: white; height: 38px; font-size: 13px; padding: 0 12px; margin-top: 8px; }

    .hidden { display: none; }

    .schedule-list-title {
      margin-top: 30px;
      border-bottom: 2px solid #42a5f5;
      padding-bottom: 8px;
      color: #1e88e5;
    }

    .schedule-item {
      background: #f7f9fb;
      padding: 20px;
      border-left: 6px solid #42a5f5;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .schedule-item h3 { margin: 0 0 10px; color: #333; }
    .schedule-item p { margin: 5px 0; font-size: 14px; color: #666; }

    .ai-box {
      background: #f5efff;
      border: 1px solid #d6c2f0;
      padding: 16px;
      margin-top: 12px;
      border-radius: 8px;
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.6;
      color: #4a148c;
    }

    audio {
      width: 100%;
      margin-top: 12px;
    }

    .help {
      margin-top: 20px;
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 AI 스마트 학업 플래너 & TTS</h1>
    <div class="subtitle">계정별 일정을 저장하고 풍부한 GPT 요약 및 AI 자동 음성 가이드를 지원합니다</div>

    <div class="info">
      현재 구조: 각각의 사용자가 로그인하면 본인만의 수행평가 목록을 독립적으로 관리하고 이용할 수 있습니다.
    </div>

    <div id="loginSection" style="text-align: center; padding: 40px 0;">
      <h2 style="margin-bottom: 20px;">서비스를 이용하려면 로그인이 필요합니다</h2>
      <button class="make-btn" id="loginBtn" style="max-width: 300px;">🌐 Google 계정으로 로그인</button>
    </div>

    <div id="appSection" class="hidden">
      <div class="user-info">
        <div>👋 <span id="userName">사용자</span>님 반갑습니다!</div>
        <button class="logout-btn" id="logoutBtn">로그아웃</button>
      </div>

      <div class="form-group">
        <div class="label">과목명</div>
        <input type="text" id="subjectInput" placeholder="예: 정보, 수학, 세계사" />
      </div>

      <div class="form-group">
        <div class="label">시험 범위 / 수행평가 내용 (AI 요약 대상)</div>
        <textarea id="textInput" placeholder="인공지능이 분석하여 상세 족보를 만들고 읽어줄 내용을 적어주세요."></textarea>
      </div>

      <div class="label">인공지능 목소리 세부 설정</div>
      <div class="option-box">
        <select id="modelSelect">
          <option value="tts-1">tts-1 빠른 생성</option>
          <option value="tts-1-hd">tts-1-hd 고품질</option>
        </select>

        <select id="voiceSelect">
          <option value="alloy">alloy (기본)</option>
          <option value="echo">echo (부드러운 남성)</option>
          <option value="fable">fable</option>
          <option value="onyx">onyx (묵직한 남성)</option>
          <option value="nova">nova (선명한 여성)</option>
          <option value="shimmer">shimmer</option>
        </select>

        <input id="speedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" placeholder="속도" />
      </div>

      <div class="form-group">
        <div class="label">마감 / 시험 날짜</div>
        <input type="date" id="examDate" />
      </div>

      <div class="button-row">
        <button class="clear-btn" id="clearBtn">초기화</button>
        <button class="make-btn" id="submitBtn" style="width: auto;">📅 플래너에 일정 등록</button>
      </div>

      <h2 class="schedule-list-title">📋 나의 수행평가 & AI 학습 지원 목록</h2>
      <div id="scheduleList"></div>
    </div>

    <div class="help">
      본 플래너는 개인 맞춤형 데이터베이스 연동형 웹서비스입니다.
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAbZphaQMs38wC0zRDBXOT7oiRe2p8ABQs",
      authDomain: "yaho-9c14e.firebaseapp.com",
      databaseURL: "https://yaho-9c14e-default-rtdb.firebaseio.com",
      projectId: "yaho-9c14e",
      storageBucket: "yaho-9c14e.firebasestorage.app",
      messagingSenderId: "63667122547",
      appId: "1:63667122547:web:1fb4d268d3e96b25d79506",
      measurementId: "G-SEWH1149ZZ"
    };

    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJxbPLRSj0YFf7SbUjpFL9s4V3im-F6u8lyU77PDNMLuI1K9a1RXOFPbeeCvIOm_vQ7A/exec';

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    let currentUser = null;

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUser = user;
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('userName').innerText = user.displayName;
        loadSchedules(user.uid); 
      } else {
        currentUser = null;
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('appSection').classList.add('hidden');
      }
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => alert("로그인 인증 실패: " + err.message));
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      auth.signOut();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('subjectInput').value = '';
      document.getElementById('textInput').value = '';
      document.getElementById('examDate').value = '';
    });

    document.getElementById('submitBtn').addEventListener('click', () => {
      const subject = document.getElementById('subjectInput').value.trim();
      const range = document.getElementById('textInput').value.trim();
      const date = document.getElementById('examDate').value;
      
      const model = document.getElementById('modelSelect').value;
      const voice = document.getElementById('voiceSelect').value;
      const speed = Number(document.getElementById('speedInput').value || 1.0);

      if (!subject || !range || !date) { 
        alert("모든 칸을 입력해 주세요!"); 
        return; 
      }

      database.ref('user_schedules/' + currentUser.uid).push({
        subject: subject,
        range: range,
        date: date,
        model: model,
        voice: voice,
        speed: speed
      }).then(() => {
        alert("성공적으로 일정이 플래너에 기록되었습니다.");
        document.getElementById('subjectInput').value = "";
        document.getElementById('textInput').value = "";
        document.getElementById('examDate').value = "";
      });
    });

    function loadSchedules(uid) {
      database.ref('user_schedules/' + uid).on('value', (snapshot) => {
        const listDiv = document.getElementById('scheduleList');
        listDiv.innerHTML = ""; 
        
        if(!snapshot.exists()) {
          listDiv.innerHTML = "<p style='text-align:center; color:#999; padding:20px;'>아직 등록된 수행평가 마감 일정이 없습니다.</p>";
          return;
        }

        snapshot.forEach((childSnapshot) => {
          const key = childSnapshot.key;
          const item = childSnapshot.val();

          const itemModel = item.model || "tts-1";
          const itemVoice = item.voice || "alloy";
          const itemSpeed = item.speed || 1.0;

          const itemHtml = `
            <div class="schedule-item">
              <h3>📘 [${item.subject}] 수행평가 및 시험 일정</h3>
              <p><strong>📅 마감 / 시험일:</strong> ${item.date}</p>
              <p><strong>📖 준비 범위 원본:</strong> ${item.range}</p>
              
              <div style="margin-top:12px;">
                <button class="ai-btn" id="combined-btn-${key}" onclick="startAIWorkflow('${key}', '${item.subject}', '${item.range.replace(/\n/g, " ")}', '${itemModel}', '${itemVoice}', ${itemSpeed})">✨ AI 핵심 요약 및 음성 듣기</button>
                <a id="download-${key}" class="download-link hidden" href="#">mp3 다운로드</a>
              </div>
              
              <div id="ai-box-${key}" class="ai-box hidden"></div>
              <div id="audio-container-${key}"></div>
            </div>
          `;
          listDiv.innerHTML += itemHtml;
        });
      });
    }

    // ----------------------------------------------------
    // 통합 프로세스: 1단계 요약 생성 ➡️ 2단계 TTS 자동 연동
    // ----------------------------------------------------
    async function startAIWorkflow(key, subject, range, model, voice, speed) {
      const btn = document.getElementById(`combined-btn-${key}`);
      const aiBox = document.getElementById(`ai-box-${key}`);
      const audioContainer = document.getElementById(`audio-container-${key}`);
      const dlLink = document.getElementById(`download-${key}`);

      btn.disabled = true;
      btn.textContent = "⏳ 1단계: GPT가 고품질 요약 작성 중...";
      aiBox.classList.remove('hidden');
      aiBox.innerText = "🤖 내용을 철저하게 분석하고 요약 노트를 컴파일하는 중입니다. 잠시만 기다려 주세요...";
      audioContainer.innerHTML = "";
      dlLink.classList.add('hidden');

      let summarizedText = "";

      // [1단계] 더욱 풍부해진 GPT 프롬프트 요약 요청
      try {
        const chatResponse = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            type: 'chat',
            question: `과목명: [${subject}]\n공부 범위 및 원본 데이터: [${range}]\n\n위 내용에 관해 고등학생이 완벽하게 시험과 수행평가를 대비할 수 있도록 아래 항목에 맞춰 아주 상세하고 깊이 있게 요약해줘.\n1. 대주제 및 핵심 취지 설명\n2. 반드시 암기해야 할 핵심 개념 요약 정리 3가지 (각 항목별로 구체적인 원리나 내용을 2~3줄씩 자세히 서술할 것)\n3. 시험 서술형이나 수행평가에 무조건 나올 법한 핵심 키워드 단어 리스트\n4. 변별력 높은 고난도 예상 기출문제 2개와 각각의 정답 및 명쾌한 해설`,
            model: 'gpt-4o-mini'
          })
        });

        const chatData = await chatResponse.json();
        
        if (chatData.answer) {
          summarizedText = chatData.answer;
          aiBox.innerText = summarizedText;
        } else {
          throw new Error(chatData.error || "요약 데이터를 받아오지 못했습니다.");
        }

      } catch (error) {
        aiBox.innerText = `❌ 요약 생성 실패: ${error.message}`;
        btn.disabled = false;
        btn.textContent = "✨ AI 핵심 요약 및 음성 듣기";
        return;
      }

      // [2단계] 생성된 요약본을 토대로 즉시 TTS 음성 생성
      try {
        btn.textContent = "⏳ 2단계: 요약본을 AI 목소리로 변환 중...";
        
        // 오디오가 끊기지 않게 특수문자나 과도한 기호를 정제하여 전달
        const cleanTextForTTS = summarizedText.replace(/[*#`\-]/g, ' ').trim();

        const ttsResponse = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            type: 'tts',
            text: cleanTextForTTS,
            model: model,
            voice: voice,
            speed: speed
          })
        });

        const ttsData = await ttsResponse.json();
        if (ttsData.error) throw new Error(ttsData.error);

        const audioUrl = base64ToAudioUrl(ttsData.audioBase64, 'audio/mpeg');
        audioContainer.innerHTML = `<audio controls src="${audioUrl}" autoplay></audio>`;
        
        dlLink.href = audioUrl;
        dlLink.download = `${subject}-요약가이드.mp3`;
        dlLink.classList.remove('hidden');

        btn.textContent = "✅ 생성 완료 (다시 요청 가능)";
      } catch (error) {
        alert("오디오 음성 변환 단계에서 오류가 발생했습니다: " + error.message);
        btn.textContent = "✨ AI 핵심 요약 및 음성 듣기";
      } finally {
        btn.disabled = false;
      }
    }

    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) {
          byteNumbers[i] = slice.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        byteArrays.push(byteArray);
      }
      return URL.createObjectURL(new Blob(byteArrays, { type: mimeType }));
    }
  </script>
</body>
</html>
