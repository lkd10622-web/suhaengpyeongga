<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 일정 관리</title>
</head>
<body>
    <h1>수행평가·시험 일정 관리 테스트</h1>
    <button id="testBtn">파이어베이스에 데이터 보내기</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // 1. 여기에 본인의 파이어베이스 설정 값을 넣어야 합니다!
        // (Firebase 콘솔 -> 프로젝트 개요 옆 톱니바퀴 -> 프로젝트 설정 -> 앱 추가에서 웹(</>) 아이콘 클릭 후 발급받기)
       const firebaseConfig = {
  apiKey: "AIzaSyAbZphaQMs38wC0zRDBXOT7oiRe2p8ABQs",
  authDomain: "yaho-9c14e.firebaseapp.com",
  databaseURL: "https://yaho-9c14e-default-rtdb.firebaseio.com",
  projectId: "yaho-9c14e",
  storageBucket: "yaho-9c14e.firebasestorage.app",
  messagingSenderId: "63667122547",
  appId: "1:63667122547:web:1fb4d268d3e96b25d79506",
  measurementId: "G-SEWH1149ZZ"
};
        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 버튼 클릭 시 데이터 전송 테스트
        document.getElementById('testBtn').addEventListener('click', function() {
            database.ref('test_schedules/').set({
                title: "수학 수행평가",
                dueDate: "2026-06-15",
                content: "교과서 10쪽~20쪽 풀이 제출"
            }).then(() => {
                alert("파이어베이스로 데이터 전송 성공!");
            }).catch((error) => {
                alert("실패 ㅠㅠ 에러: " + error);
            });
        });
    </script>
</body>
</html>
