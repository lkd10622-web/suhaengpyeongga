<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 학업 지원 플래너 & 족보 요약기</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1, h2 { text-align: center; color: #1a73e8; margin-top: 10px; }
    
    /* 인증 영역 스타일 */
    .auth-section {
      text-align: right;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px dashed #eee;
    }
    .user-info { font-weight: bold; margin-right: 10px; color: #555; }
    
    /* 버튼 공통 스타일 */
    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-blue { background-color: #1a73e8; color: white; }
    .btn-blue:hover { background-color: #1557b0; }
    .btn-google { background-color: #4285f4; color: white; }
    .btn-google:hover { background-color: #357ae8; }
    .btn-logout { background-color: #5f6368; color: white; }
    .btn-logout:hover { background-color: #4ab3b3; }
    
    .btn-summary { background-color: #34a853; color: white; width: 100%; padding: 12px; font-size: 16px; margin-top: 15px; }
    .btn-summary:hover { background-color: #2b8c44; }
    .btn-audio { background-color: #fbbc05; color: #333; }
    .btn-audio:hover { background-color: #e6a800; }
    .btn-danger { background-color: #ea4335; color: white; padding: 5px 10px; font-size: 12px; }
    
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .input-group input, .input-group textarea {
      width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
    }
    
    /* 리스트 및 요약창 */
    .list-container { margin-top: 25px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
    .schedule-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; border-bottom: 1px solid #eee; margin-bottom: 5px; background: #fff; border-radius: 4px;
    }
    .summary-box {
      margin-top: 25px; padding: 20px; background: #e8f0fe; border-left: 5px solid #1a73e8; border-radius: 6px;
      white-space: pre-wrap; line-height: 1.6; display: none;
    }
    .audio-controls { display: none; margin-top: 15px; text-align: center; background: #fff3cd; padding: 15px; border-radius: 8px; }
    .status { color: #666; font-style: italic; text-align: center; margin-top: 10px; font-weight: bold; white-space: pre-line; }
    .main-content { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="auth-section">
    <div id="loggedOutUI">
      <span class="user-info">서비스를 이용하려면 로그인이 필요합니다.</span>
      <button class="btn btn-google" onclick="loginWithGoogle()">🔑 구글 계정으로 로그인</button>
    </div>
    <div id="loggedInUI" style="display: none;">
      <span class="user-info" id="userNameDisplay">사용자님 환영합니다!</span>
      <button class="btn btn-logout" onclick="logoutFromFirebase()">🚪 로그아웃</button>
    </div>
  </div>

  <h1>🎓 AI 학업 지원 플래너</h1>
  
  <div class="main-content" id="mainPlannerContent">
    <div class="input-group">
      <label>과목명</label>
      <input type="text" id="subject" placeholder="예: 통합과학, 수학I">
    </div>
    <div class="input-group">
      <label>시험 범위 및 학습 내용</label>
      <textarea id="range" rows="3" placeholder="예: 교과서 45p~80p, 세포 분열과 유전 법칙 단원"></textarea>
    </div>
    <button class="btn btn-blue" style="width:100%; padding:12px; font-size:15px;" onclick="addSchedule()">📅 플래너에 일정 저장</button>

    <div class="list-container">
      <h3>📋 나의 수행평가 & AI 학습 지원 목록</h3>
      <div id="scheduleList">데이터를 불러오는 중입니다...</div>
    </div>

    <button class="btn btn-summary" onclick="generateAiSummary()">📋 공부할 내용 요약 생성 (Gemini)</button>
    
    <div class="audio-controls" id="audioSection">
      <h4 style="margin:0 0 10px 0; color:#856404;">🔊 AI 요약 음성 컨트롤러</h4>
      <button class="btn btn-audio" style="margin-right:10px;" onclick="playTtsAudio()">▶️ 오디오 듣기 (TTS)</button>
      <button class="btn" style="background-color:#ea4335; color:white;" onclick="stopTtsAudio()">⏹️ 음성 중지</button>
    </div>

    <div class="status" id="statusMessage"></div>
    <div class="summary-box" id="summaryBox"></div>
  </div>
</div>

<script>
  // 1️⃣ [파이어베이스 초기화 및 앱스크립트 주소 설정]
  const firebaseConfig = {
    apiKey: "AIzaSyAbZphaQMs38wC0zRDBXOT7oiRe2p8ABQs",
    authDomain: "yaho-9c14e.firebaseapp.com",
    databaseURL: "https://yaho-9c14e-default-rtdb.firebaseio.com",
    projectId: "yaho-9c14e",
    storageBucket: "yaho-9c14e.firebasestorage.app",
    messagingSenderId: "63667122547",
    appId: "1:63667122547:web:1fb4d268d3e96b25d79506"
  };
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const database = firebase.database();
  
  // 🔗 스크린샷에 나온 최신 배포 주소 매핑
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwHGK84nnejR3re3DX3DkSJx_eHwaviR0--43RWl6SgtyjRd95IvOf_pmOQfDHGt_Xg/exec';
  
  let currentUser = null;
  let currentTtsText = "";
  let localSchedules = [];

  // 2️⃣ [인증 상태 감지]
  auth.onAuthStateChanged((user) => {
    if (user) {
      currentUser = user;
      document.getElementById('loggedOutUI').style.display = 'none';
      document.getElementById('loggedInUI').style.display = 'block';
      document.getElementById('userNameDisplay').innerText = `👤 ${user.displayName}님 환영합니다!`;
      document.getElementById('mainPlannerContent').style.display = 'block';
      loadSchedules(user.uid);
    } else {
      currentUser = null;
      document.getElementById('loggedOutUI').style.display = 'block';
      document.getElementById('loggedInUI').style.display = 'none';
      document.getElementById('mainPlannerContent').style.display = 'none';
      stopTtsAudio();
    }
  });

  function loginWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(error => {
      alert("로그인 오류: " + error.message);
    });
  }

  function logoutFromFirebase() {
    auth.signOut().then(() => { alert("로그아웃 되었습니다."); });
  }

  // 3️⃣ [실시간 데이터베이스 연동]
  function addSchedule() {
    if (!currentUser) return;
    const subject = document.getElementById('subject').value.trim();
    const range = document.getElementById('range').value.trim();
    
    if(!subject || !range) {
      alert("과목명과 내용을 입력하세요!");
      return;
    }
    
    const newScheduleRef = database.ref('users/' + currentUser.uid + '/schedules').push();
    newScheduleRef.set({
      subject: subject,
      range: range,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
      document.getElementById('subject').value = '';
      document.getElementById('range').value = '';
    });
  }

  function loadSchedules(uid) {
    database.ref('users/' + uid + '/schedules').on('value', (snapshot) => {
      const listDiv = document.getElementById('scheduleList');
      const data = snapshot.val();
      localSchedules = [];
      
      if (!data) {
        listDiv.innerHTML = "<p style='text-align:center; color:#999;'>등록된 일정이 없습니다.</p>";
        return;
      }
      
      let html = "";
      for (let key in data) {
        localSchedules.push(data[key]);
        html += `
          <div class="schedule-item">
            <div>
              <span style="color:#1a73e8; font-weight:bold;">[${data[key].subject}]</span> 
              <span>${data[key].range}</span>
            </div>
            <button class="btn btn-danger" onclick="deleteSchedule('${key}')">삭제</button>
          </div>
        `;
      }
      listDiv.innerHTML = html;
    });
  }

  function deleteSchedule(key) {
    if (!currentUser) return;
    if (confirm("삭제하시겠습니까?")) {
      database.ref('users/' + currentUser.uid + '/schedules/' + key).remove();
    }
  }

  // 🧠 4️⃣ [제미나이 AI 요약 및 대안 안내 설계]
  async function generateAiSummary() {
    if (localSchedules.length === 0) {
      alert("등록된 일정이 없습니다.");
      return;
    }

    const statusMsg = document.getElementById('statusMessage');
    const summaryBox = document.getElementById('summaryBox');
    const audioSection = document.getElementById('audioSection');
    
    statusMsg.innerText = "⚡ 요약을 생성하고 있습니다...";
    summaryBox.style.display = 'none';
    audioSection.style.display = 'none';
    stopTtsAudio();

    let scheduleText = localSchedules.map(s => `과목: ${s.subject}\n범위: ${s.range}`).join('\n\n');
    let promptQuestion = `아래 시험 범위들을 분석해서 고등학교 시험에 무조건 나오는 핵심 요점정리 족보를 만들어줘:\n\n${scheduleText}`;

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, 
        body: JSON.stringify({ question: promptQuestion })
      });

      if (!response.ok) throw new Error("Fetch 거절됨");

      const data = await response.json();

      if (data.error) {
        statusMsg.innerText = "❌ 서버 오류: " + data.error;
      } else {
        statusMsg.innerText = "✅ 요약 성공!";
        summaryBox.innerText = data.answer;
        summaryBox.style.display = 'block';
        currentTtsText = data.ttsText || data.answer.replace(/[*#`_\-]/g, ' ');
        audioSection.style.display = 'block';
      }
    } catch (error) {
      // ⚠️ 학교 계정 차단 문제를 안내하는 정밀 방어 코드
      statusMsg.innerText = "❌ 에러 발생: Failed to fetch\n\n💡 [해결 방법 안내]\n현재 학교 계정(@daehun.hs.kr)으로 앱스크립트가 실행되어 학교 보안 방화벽이 차단 중일 확률이 매우 높습니다.\n앱스크립트 창으로 가셔서 우측 상단 프로필을 누르고 일반 개인 구글 계정(@gmail.com)으로 똑같이 코드를 복사해 [새 배포]를 하신 뒤, 그 주소로 교체하시면 즉시 100% 정상 작동합니다!";
      console.error(error);
    }
  }

  // 🔊 5️⃣ [한국어 오디오 TTS 재생]
  function playTtsAudio() {
    if (!currentTtsText) return;
    window.speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(currentTtsText);
    speech.lang = 'ko-KR';
    speech.rate = 1.0;
    speech.pitch = 1.0;

    const voices = window.speechSynthesis.getVoices();
    const koreanVoice = voices.find(v => v.lang === 'ko-KR' || v.lang.startsWith('ko'));
    if (koreanVoice) speech.voice = koreanVoice;

    document.getElementById('statusMessage').innerText = "📢 AI 요약본을 음성으로 낭독하고 있습니다...";
    window.speechSynthesis.speak(speech);

    speech.onend = function() {
      document.getElementById('statusMessage').innerText = "✅ 음성 낭독 완료.";
    };
  }

  function stopTtsAudio() {
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      document.getElementById('statusMessage').innerText = "⏹️ 음성 재생 중지.";
    }
  }
</script>
</body>
</html>
